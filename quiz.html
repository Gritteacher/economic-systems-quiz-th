<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="หน้าสุ่มคำถามภาษาไทยเกี่ยวกับระบบเศรษฐกิจตามหมวดที่เลือก"
    />
    <title>ระบบเศรษฐกิจ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./quiz.js" defer></script>
  </head>
  <body>
    <main class="app-shell quiz-page">
      <header class="quiz-header">
        <a class="back-link" href="./index.html">← หมวดคำถาม</a>
        <p class="site-credit quiz-credit">พัฒนาโดย ครูไต๋ กฤษณพล ทองอุ่น</p>
        <div class="quiz-meta">
          <span id="active-category" class="active-category"></span>
          <span id="question-count" class="question-count"></span>
        </div>
      </header>

      <section class="quiz-stage" aria-live="polite">
        <article class="question-card">
          <p id="question-text" class="question-text"></p>
          <div id="answer-panel" class="answer-panel" hidden>
            <h2>เฉลย</h2>
            <p id="answer-text"></p>
          </div>
        </article>

        <div class="actions">
          <button id="reveal-answer" class="button button-secondary" type="button">
            <span aria-hidden="true">?</span>
            เฉลย
          </button>
          <button id="next-question" class="button button-primary" type="button">
            <span aria-hidden="true">+</span>
            สุ่มคำถาม
          </button>
          <button id="reset-cycle" class="icon-button" type="button" aria-label="เริ่มชุดคำถามของหมวดนี้ใหม่">
            <span aria-hidden="true">↻</span>
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
